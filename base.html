<!DOCTYPE html>
<html>
<head>
    <title>My Town Shops</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .nav {
            background: white;
            padding: 10px;
            text-align: center;
        }

        .nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 8px 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            text-decoration: none;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🏪 My Town Shops</h1>
</div>

<div class="nav">
    <a href="/">Home</a>

    {% if user %}
        <span>Welcome, {{ user }}</span>
        <a href="/logout">Logout</a>
        <a href="/add">Add Shop</a>
        {% if role == 'admin' %}
            <a href="/add-offer">Add Offer</a>
        {% endif %}
    {% else %}
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    {% endif %}
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
