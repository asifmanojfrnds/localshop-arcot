<!DOCTYPE html>
<html>
<body>

<h1>My Town Shops</h1>

{% if user %}
<p>Welcome {{ user }} ({{ role }})</p>
<a href="/logout">Logout</a>
{% else %}
<a href="/login">Login</a>
<a href="/register">Register</a>
{% endif %}

<br><br>

<a href="/add">Add Shop</a>

<hr>

{% for shop in shops %}
<div>
    <h3>{{ shop[1] }}</h3>
    <p>Owner: {{ shop[2] }}</p>
    <p>Category: {{ shop[3] }}</p>
    <p>Location: {{ shop[4] }}</p>

    {% if role == 'admin' %}
        <a href="/edit/{{ shop[0] }}">Edit</a> |
        <a href="/delete/{{ shop[0] }}">Delete</a>
    {% endif %}
</div>
<hr>
{% endfor %}

</body>
</html>
