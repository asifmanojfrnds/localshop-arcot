<!DOCTYPE html>
<html>
<head>
    <title>My Town Shops</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            margin: 0;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 15px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .filter {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .actions a {
            margin-right: 10px;
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }

        .actions a.delete {
            color: red;
        }
    </style>
</head>

<body>

<header>
    <h1>🏪 My Town Shops</h1>
</header>

<div class="container">

    <div class="top-bar">
        <a href="/add" class="btn">+ Add Shop</a>
    </div>

    <!-- FILTER -->
    <form method="GET" class="filter">
        <label>Filter:</label>
        <select name="category">
            <option value="">All</option>
            <option value="Grocery">Grocery</option>
            <option value="Medical">Medical</option>
            <option value="Tea Shop">Tea Shop</option>
            <option value="Bakery">Bakery</option>
        </select>
        <button class="btn">Apply</button>
    </form>

    <!-- SHOP CARDS -->
    {% for shop in shops %}
    <div class="card">
        <h3>{{ shop[1] }}</h3>
        <p><b>Owner:</b> {{ shop[2] }}</p>
        <p><b>Category:</b> {{ shop[3] }}</p>
        <p><b>Location:</b> {{ shop[4] }}</p>

        <div class="actions">
            <a href="/edit/{{ shop[0] }}">Edit</a>
            <a href="/delete/{{ shop[0] }}" class="delete"
               onclick="return confirm('Delete this shop?')">Delete</a>
        </div>
    </div>
    {% endfor %}

</div>

</body>
</html>
